services:
  api:
    build: .
    container_name: extrae_api
    restart: always
    expose:
      - "3000"
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: extrae_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
